services:
  openrag-backend:
    environment:
      - FASTPDF_OPENRAG_BACKEND_SEARCH_RERANK_ENABLED=${FASTPDF_OPENRAG_BACKEND_SEARCH_RERANK_ENABLED:-true}
      - FASTPDF_OPENRAG_BACKEND_SEARCH_RERANK_CANDIDATE_LIMIT=${FASTPDF_OPENRAG_BACKEND_SEARCH_RERANK_CANDIDATE_LIMIT:-24}
    volumes:
      - ${FASTPDF_OPENRAG_NATIVE_ROOT}/openrag-hotfixes/api_v1_search.py:/app/src/api/v1/search.py:ro

  langflow:
    environment:
      - FASTPDF_OPENRAG_BACKEND_RERANK_ENABLED=${FASTPDF_OPENRAG_BACKEND_RERANK_ENABLED:-true}
      - FASTPDF_OPENRAG_BACKEND_RERANK_PROVIDER=${FASTPDF_OPENRAG_BACKEND_RERANK_PROVIDER:-cross_encoder}
      - FASTPDF_OPENRAG_BACKEND_RERANK_MODEL=${FASTPDF_OPENRAG_BACKEND_RERANK_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      - FASTPDF_OPENRAG_BACKEND_RERANK_TOP_N=${FASTPDF_OPENRAG_BACKEND_RERANK_TOP_N:-8}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
